<!DOCTYPE html>
<html lang="pl" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumbago Music AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Biblioteka do odczytu tagów ID3 -->
    <script src="https://cdn.jsdelivr.net/npm/jsmediatags@3.9.7/dist/jsmediatags.min.js"></script>
    <!-- Biblioteka do zapisu tagów ID3 (dla MP3) -->
    <script src="https://cdn.jsdelivr.net/npm/js-id3-writer@1.1.2/dist/id3-writer.min.js"></script>
    <!-- Biblioteka do zapisu tagów MP4 (dla M4A) -->
    <script src="https://cdn.jsdelivr.net/npm/mp4-tag-writer/dist/mp4-tag-writer.min.js"></script>
    <!-- Biblioteka do tworzenia archiwów ZIP -->
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <!-- Biblioteka do generowania unikalnych ID -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/uuid/8.3.2/uuid.min.js"></script>
    <!-- Biblioteka do zapisu plików -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <!-- Biblioteka do wizualizacji fali dźwiękowej -->
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <!-- Wtyczka do spektrogramu dla wavesurfer.js -->
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/spectrogram.js"></script>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.24.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",

  }
}

<script>
    // Konfiguracja Tailwind CSS dla trybu ciemnego
    tailwind.config = {
      darkMode: 'class',
    }

<style>
  :root {
    --bg-main-start: #0a0e27;
    --bg-main-mid: #1a1a2e;
    --bg-main-end: #16213e;
    --bg-panel: rgba(14, 16, 36, 0.7);
    --bg-panel-solid: #0e1024;
    --bg-header: rgba(6, 7, 10, 0.8);
    --text-light: #e6f7ff;
    --text-dim: #b9f6ff;
    --text-dark: #9ff0ff;
    --accent-cyan: #8ef0ff;
    --accent-magenta: #ff66cc;
    --accent-green: #39ff14;
    --accent-green-end: #00ff88;
    --border-color: rgba(142, 240, 255, 0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, var(--bg-main-start) 0%, var(--bg-main-mid) 50%, var(--bg-main-end) 100%);
    color: var(--text-light);
    line-height: 1.6;
    overflow-x: hidden;
  }
  
  /* Custom Scrollbar */
  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }
  ::-webkit-scrollbar-track {
    background: var(--bg-main-start);
  }
  ::-webkit-scrollbar-thumb {
    background: var(--accent-cyan);
    border-radius: 4px;
    border: 2px solid var(--bg-main-start);
  }
  ::-webkit-scrollbar-thumb:hover {
    background: var(--accent-magenta);
  }

  @keyframes fade-in {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-fade-in {
    animation: fade-in 0.3s ease-out forwards;
  }
  
  @keyframes fade-out {
    from { opacity: 1; max-height: 100px; transform: scaleY(1); }
    to { opacity: 0; max-height: 0; padding-top: 0; padding-bottom: 0; margin: 0; transform: scaleY(0); }
  }
  .animate-fade-out {
    animation: fade-out 0.3s ease-out forwards;
    transform-origin: top;
    overflow: hidden;
  }
  
  @keyframes flash-success {
    0% { background-color: rgba(57, 255, 20, 0.2); }
    100% { background-color: transparent; }
  }
  .animate-flash-success {
    animation: flash-success 0.7s ease-out;
  }

  @keyframes flash-error {
    0% { background-color: rgba(255, 102, 204, 0.2); }
    100% { background-color: transparent; }
  }
  .animate-flash-error {
    animation: flash-error 0.7s ease-out;
  }
  
  .btn-spinner {
    display: inline-block;
    width: 1.25em;
    height: 1.25em;
    border: 2px solid currentColor;
    border-right-color: transparent;
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    margin-right: 0.5rem;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .btn-gradient {
    background: linear-gradient(45deg, var(--accent-green), var(--accent-green-end));
    color: #0a0e27 !important;
    font-weight: bold;
    border: none;
    transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
  }
  .btn-gradient:hover:not(:disabled) {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(57, 255, 20, 0.4);
  }
  .btn-gradient:disabled {
      background: #777;
      opacity: 0.5;
      cursor: not-allowed;
  }

  .btn-gradient-secondary {
    background: linear-gradient(45deg, var(--accent-cyan), var(--accent-magenta));
    color: #0a0e27 !important;
    font-weight: bold;
    border: none;
    transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
  }
  .btn-gradient-secondary:hover:not(:disabled) {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(142, 240, 255, 0.4);
  }

  .lumbago { color: var(--accent-cyan); text-shadow: 0 0 10px rgba(142, 240, 255, 0.5); }
  .music-ai { color: var(--accent-magenta); text-shadow: 0 0 10px rgba(255, 102, 204, 0.5); }
  
  .panel {
    background: var(--bg-panel);
    border-radius: 15px;
    border: 1px solid var(--border-color);
    padding: 1.5rem;
    overflow-y: auto;
  }

  .table-container {
    overflow-y: auto;
    height: 100%;
  }

  .track-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
  }

  .track-table th {
    position: sticky;
    top: 0;
    padding: 0.75rem;
    text-align: left;
    color: var(--accent-cyan);
    cursor: pointer;
    background: linear-gradient(to bottom, rgba(14, 16, 36, 1), rgba(14, 16, 36, 0.8));
    backdrop-filter: blur(5px);
  }
  .track-table th:hover .sort-icon {
    opacity: 1;
  }
  .sort-icon {
    opacity: 0.5;
    margin-left: 4px;
    display: inline-block;
    transition: opacity 0.2s;
  }
  
  .track-table td {
    padding: 0.75rem;
    border-bottom: 1px solid var(--border-color);
  }

  .track-table tbody tr {
    cursor: pointer;
    transition: background-color 0.2s;
  }
  
  .track-table tbody tr:hover {
    background-color: rgba(142, 240, 255, 0.1);
  }

  .track-table tbody tr.selected {
    background-color: rgba(255, 102, 204, 0.15);
    border-left: 3px solid var(--accent-magenta);
  }

  /* Equalizer styles */
  .equalizer {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 4px;
    height: 24px;
  }
  .equalizer .bar {
    width: 6px;
    background: linear-gradient(to top, var(--accent-green), var(--accent-green-end));
    border-radius: 3px 3px 0 0;
    animation: pulse 1.5s ease-in-out infinite;
  }
  .equalizer .bar:nth-child(1) { height: 30%; animation-delay: 0s; }
  .equalizer .bar:nth-child(2) { height: 80%; animation-delay: 0.1s; }
  .equalizer .bar:nth-child(3) { height: 50%; animation-delay: 0.2s; }
  .equalizer .bar:nth-child(4) { height: 100%; animation-delay: 0.3s; }
  .equalizer .bar:nth-child(5) { height: 65%; animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 100% { transform: scaleY(0.4); opacity: 0.7; }
    50% { transform: scaleY(1); opacity: 1; }
  }

  /* Waveform Player Styles */
  .waveform-container {
    width: 100%;
    height: 100px;
    background: var(--bg-panel-solid);
    border-radius: 8px;
    border: 1px solid var(--border-color);
    position: relative;
    overflow: hidden;
  }
  
  .waveform-container > div {
    height: 100%;
  }
  
  .spectrogram-container {
      height: 100px;
  }
  
  .spectrogram-container canvas {
      width: 100%;
      height: 100%;
  }

  .hotcue-marker {
    position: absolute;
    width: 2px;
    height: 100%;
    background-color: var(--accent-green);
    opacity: 0.7;
    z-index: 5;
    pointer-events: none;
  }
  .hotcue-marker::before {
    content: attr(data-cue);
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent-green);
    color: var(--bg-main);
    padding: 1px 4px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: bold;
  }

  /* Context Menu Styles */
  .context-menu {
    position: fixed;
    z-index: 1000;
    width: 224px; /* 14rem */
    background-color: var(--bg-panel-solid);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    padding: 0.5rem;
    animation: context-menu-fade-in 0.1s ease-out;
  }

  .context-menu-item {
    display: flex;
    align-items: center;
    width: 100%;
    padding: 0.5rem 0.75rem;
    font-size: 0.875rem;
    color: var(--text-dim);
    background-color: transparent;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    text-align: left;
  }
  .context-menu-item:hover, .context-menu-submenu:hover > .context-menu-item {
    background-color: rgba(142, 240, 255, 0.1);
    color: var(--text-light);
  }
  .context-menu-item svg {
    margin-right: 0.75rem;
    width: 1rem;
    height: 1rem;
  }
  .context-menu-item.danger {
    color: var(--accent-magenta);
  }
  .context-menu-item.danger:hover {
    background-color: rgba(255, 102, 204, 0.1);
  }

  .context-menu-separator {
    height: 1px;
    margin: 0.5rem 0;
    background-color: var(--border-color);
  }
  
  .context-menu-submenu {
      position: relative;
  }
  
  .context-menu-submenu-panel {
      display: none;
      position: absolute;
      left: 100%;
      top: -0.5rem;
      width: 224px;
      background-color: var(--bg-panel-solid);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      padding: 0.5rem;
  }

  .context-menu-submenu:hover .context-menu-submenu-panel {
      display: block;
  }

  @keyframes context-menu-fade-in {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
  }
  
  /* Pitch Slider Styles */
  .pitch-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: var(--bg-panel-solid);
    border-radius: 2px;
    outline: none;
    border: 1px solid var(--border-color);
  }

  .pitch-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    background: var(--accent-cyan);
    cursor: pointer;
    border-radius: 50%;
    border: 2px solid var(--bg-main-start);
    box-shadow: 0 0 5px rgba(142, 240, 255, 0.7);
  }

  .pitch-slider::-moz-range-thumb {
    width: 16px;
    height: 16px;
    background: var(--accent-cyan);
    cursor: pointer;
    border-radius: 50%;
    border: 2px solid var(--bg-main-start);
    box-shadow: 0 0 5px rgba(142, 240, 255, 0.7);
  }

  /* Channel Meters Styles */
  .channel-meters {
      display: flex;
      gap: 4px;
      width: 40px;
      height: 100%;
  }
  .meter-bar {
      flex: 1;
      background: var(--bg-panel-solid);
      border: 1px solid var(--border-color);
      border-radius: 2px;
      display: flex;
      flex-direction: column-reverse;
      overflow: hidden;
  }
  .meter-level {
      width: 100%;
      background: linear-gradient(to top, var(--accent-green) 0%, var(--accent-magenta) 100%);
      transform-origin: bottom;
      transform: scaleY(0);
  }
  
  @keyframes pulse-meter-l {
    0% { transform: scaleY(0.1); } 30% { transform: scaleY(0.8); } 60% { transform: scaleY(0.4); } 100% { transform: scaleY(0.1); }
  }
  @keyframes pulse-meter-r {
    0% { transform: scaleY(0.2); } 40% { transform: scaleY(0.9); } 75% { transform: scaleY(0.3); } 100% { transform: scaleY(0.2); }
  }
  .meter-level-l.playing { animation: pulse-meter-l 1.2s ease-in-out infinite; }
  .meter-level-r.playing { animation: pulse-meter-r 1.1s ease-in-out infinite; }
  
  /* Welcome Screen Styles */
  .quick-start-step {
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 1.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
  }
  .quick-start-step:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 20px rgba(142, 240, 255, 0.1);
  }

  .step-number {
      position: absolute;
      top: -10px;
      left: 10px;
      font-size: 4rem;
      font-weight: bold;
      color: rgba(142, 240, 255, 0.05);
      z-index: 0;
  }
  .quick-start-step > * {
      position: relative;
      z-index: 1;
  }

  @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
  }
  .animate-fade-in-up {
      opacity: 0;
      animation: fade-in-up 0.5s ease-out forwards;
  }
  .delay-1 { animation-delay: 0.1s; }
  .delay-2 { animation-delay: 0.2s; }
  .delay-3 { animation-delay: 0.3s; }

</style>

</head>
  <body class="bg-bg-main text-text-light">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>

name: Web CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect_web:
    runs-on: ubuntu-latest
    outputs:
      has_web: ${{ steps.filter.outputs.has_web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            has_web:
              - 'web/**'
              - 'frontend/**'
              - '**/package.json'
              - '**/pnpm-lock.yaml'
              - '**/package-lock.json'
              - '**/yarn.lock'

  web_ci:
    name: Build/Test Web
    runs-on: ubuntu-latest
    needs: detect_web
    if: needs.detect_web.outputs.has_web == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve web working directory
        id: web_dir
        run: |
          if [ -f web/package.json ]; then
            echo "dir=web" >> "$GITHUB_OUTPUT"
          elif [ -f frontend/package.json ]; then
            echo "dir=frontend" >> "$GITHUB_OUTPUT"
          else
            dir="$(find . -maxdepth 3 -name package.json | head -n 1 | xargs dirname)"
            echo "dir=${dir#./}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        working-directory: ${{ steps.web_dir.outputs.dir }}
        run: |
          if [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run tests (if configured)
        working-directory: ${{ steps.web_dir.outputs.dir }}
        run: npm test --if-present

      - name: Build
        working-directory: ${{ steps.web_dir.outputs.dir }}
        run: npm run build --if-present


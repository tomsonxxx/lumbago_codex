name: Desktop CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  tests:
    name: Pytest (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Linux runtime dependencies for PyQt6
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libegl1 libglib2.0-0 libdbus-1-3 libfontconfig1 \
            libx11-6 libx11-xcb1 libxext6 libxrender1 libxkbcommon0 libxkbcommon-x11-0 \
            libxcb1 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render0 libxcb-render-util0 libxcb-shape0 libxcb-shm0 libxcb-xfixes0

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a python -m pytest -q tests

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: python -m pytest -q tests

  build-windows:
    name: Windows Build Artifact
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build PyInstaller
        run: |
          pyinstaller pyinstaller.spec --noconfirm

      - name: Smoke test executable
        shell: pwsh
        run: |
          $env:LUMBAGO_SAFE_MODE = "1"
          $env:LUMBAGO_DISABLE_MULTIMEDIA = "1"
          $env:LUMBAGO_SMOKE_SECONDS = "2"
          Start-Process -FilePath ".\dist\LumbagoMusicAI\LumbagoMusicAI.exe" -Wait

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LumbagoMusicAI-windows
          path: dist/LumbagoMusicAI

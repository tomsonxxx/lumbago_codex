name: Desktop CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: desktop-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Pytest (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Linux deps (PyQt)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libegl1 libglib2.0-0 libdbus-1-3 libfontconfig1 \
            libx11-6 libx11-xcb1 libxext6 libxrender1 libxkbcommon0 libxkbcommon-x11-0 \
            libxcb1 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render0 libxcb-render-util0 libxcb-shape0 libxcb-shm0 libxcb-xfixes0
          # libpulse0t64 (Ubuntu 24.04) lub libpulse0 (starsze) — instaluj co dostępne
          sudo apt-get install -y libpulse0t64 || sudo apt-get install -y libpulse0 || true
      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a python -m pytest -q tests
      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: python -m pytest -q tests
      - name: Smoke UI (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          LUMBAGO_SAFE_MODE: "1"
          LUMBAGO_SMOKE_SECONDS: "3"
        run: xvfb-run -a python -m lumbago_app.main
      - name: Smoke UI (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          LUMBAGO_SAFE_MODE: "1"
          LUMBAGO_SMOKE_SECONDS: "3"
        run: python -m lumbago_app.main

  build_windows:
    needs: tests
    name: Build Windows Artifact
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build
        run: pyinstaller pyinstaller.spec --noconfirm
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LumbagoMusicAI-windows
          path: |
            dist/LumbagoMusicAI/**
            dist/LumbagoMusicAI.exe

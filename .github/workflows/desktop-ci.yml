name: Desktop CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: desktop-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Pytest (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Run tests
        run: python -m pytest -q tests
      - name: Smoke UI
        shell: bash
        env:
          LUMBAGO_SAFE_MODE: "1"
          LUMBAGO_SMOKE_SECONDS: "3"
        run: python main.py

  build_windows:
    needs: tests
    name: Build Windows Artifact
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build
        run: pyinstaller pyinstaller.spec --noconfirm
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LumbagoMusicAI-windows
          path: |
            dist/LumbagoMusicAI/**
            dist/LumbagoMusicAI.exe

name: Linux PyQt6 Smoke

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Linux runtime dependencies for PyQt6
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libegl1 libglib2.0-0 libdbus-1-3 libfontconfig1 \
            libx11-6 libx11-xcb1 libxext6 libxrender1 libxkbcommon0 libxkbcommon-x11-0 \
            libxcb1 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render0 libxcb-render-util0 libxcb-shape0 libxcb-shm0 libxcb-xfixes0

      - name: Smoke test (safe mode, no multimedia)
        run: |
          xvfb-run -a env \
            LUMBAGO_SAFE_MODE=1 \
            LUMBAGO_DISABLE_MULTIMEDIA=1 \
            LUMBAGO_SMOKE_SECONDS=2 \
            python -m lumbago_app.main

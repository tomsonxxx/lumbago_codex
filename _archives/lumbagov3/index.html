
<!DOCTYPE html>

    <title>Lumbago Music AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Biblioteka do odczytu tagów ID3 -->

    <!-- Biblioteka do zapisu tagów ID3 (dla MP3) - Zaktualizowana do browser-id3-writer (jsdelivr) -->

    <!-- Biblioteka do zapisu tagów MP4 (dla M4A) -->

    <!-- Biblioteka do tworzenia archiwów ZIP -->
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <!-- Biblioteka do generowania unikalnych ID -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/uuid/8.3.2/uuid.min.js"></script>
    <!-- Biblioteka do zapisu plików -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.24.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",

    "@testing-library/react": "https://aistudiocdn.com/@testing-library/react@^16.3.0",
    "vitest": "https://aistudiocdn.com/vitest@^4.0.15",

  }
}

<script>
    // Konfiguracja Tailwind CSS dla trybu ciemnego
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            slate: {
              850: '#1e293b', // Custom dark slate
              900: '#0f172a',
              950: '#020617', // Deepest background
            }
          }
        }
      }
    }
  </script>
<style>
  body {
    background-color: #050505; /* Deep black/blue */
    background-image: radial-gradient(circle at 10% 20%, rgba(79, 70, 229, 0.08) 0%, transparent 20%),
                      radial-gradient(circle at 90% 80%, rgba(236, 72, 153, 0.08) 0%, transparent 20%);
    color: #e6f7ff;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
  }
  
  /* Scrollbar styling for dark theme */
  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }
  ::-webkit-scrollbar-track {
    background: #0f172a; 
  }
  ::-webkit-scrollbar-thumb {
    background: #334155; 
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: #475569; 
  }

  @keyframes fade-in {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-fade-in {
    animation: fade-in 0.3s ease-out forwards;
  }
  
  @keyframes fade-out {
    from { opacity: 1; max-height: 100px; transform: scaleY(1); }
    to { opacity: 0; max-height: 0; padding-top: 0; padding-bottom: 0; margin: 0; transform: scaleY(0); }
  }
  .animate-fade-out {
    animation: fade-out 0.3s ease-out forwards;
    transform-origin: top;
    overflow: hidden;
  }
  
  @keyframes flash-success {
    0% { background-color: rgba(34, 197, 94, 0.2); }
    100% { background-color: transparent; }
  }
  .animate-flash-success {
    animation: flash-success 0.7s ease-out;
  }

  @keyframes flash-error {
    0% { background-color: rgba(248, 113, 113, 0.2); }
    100% { background-color: transparent; }
  }
  .animate-flash-error {
    animation: flash-error 0.7s ease-out;
  }
  
  /* Animacja tła dla przetwarzania */
  @keyframes gradient-loading {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .animate-gradient-loading {
    background-size: 200% 200%;
    animation: gradient-loading 2s ease infinite;
  }
  
  .btn-spinner {
    display: inline-block;
    width: 1.25em;
    height: 1.25em;
    border: 2px solid currentColor;
    border-right-color: transparent;
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    margin-right: 0.5rem;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Neon Glow Utilities */
  .neon-text-blue {
    text-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
  }
  .neon-text-pink {
    text-shadow: 0 0 10px rgba(236, 72, 153, 0.5);
  }
  .neon-box {
    box-shadow: 0 0 20px rgba(99, 102, 241, 0.15);
  }

</style>
<link rel="stylesheet" href="/index.css">
</head>

</body>
</html>

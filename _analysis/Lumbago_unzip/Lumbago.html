<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Lumbago Music AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
input,select{font:inherit}

/* ── CYBER THEME TOKENS ── */
:root {
  --bg:           #0b0f16;
  --surface:      #141a2a;
  --surface2:     #101522;
  --border:       #1f2a3d;
  --border-accent:#2b3a55;
  --text:         #e8f3ff;
  --text-muted:   #8fb8d8;
  --accent:       #63f2ff;
  --accent2:      #ff6bd5;
  --accent-glow:  rgba(99,242,255,0.12);
  --success:      #39ffb6;
  --warn:         #f7c26a;
  --danger:       #ff6b6b;
  --sidebar-w:    220px;
  --player-h:     76px;
  --radius:       12px;
  --font:         'Inter','Segoe UI',sans-serif;
  --font-mono:    'JetBrains Mono',monospace;
}

/* ── BASE ── */
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;line-height:1.4}
#root{height:100%}
.lmb-app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.lmb-sidebar{width:var(--sidebar-w);flex-shrink:0;background:rgba(8,11,20,0.98);border-right:1px solid var(--border);display:flex;flex-direction:column;gap:4px;padding:16px 12px;overflow-y:auto}
.lmb-logo{display:flex;flex-direction:column;padding:0 4px 14px;border-bottom:1px solid var(--border);margin-bottom:8px}
.lmb-logo-text{font-size:22px;font-weight:800;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px}
.lmb-logo-sub{font-size:9px;color:var(--text-muted);letter-spacing:2.5px;text-transform:uppercase;margin-top:-2px}
.lmb-cta-import{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;margin-bottom:8px;background:linear-gradient(135deg,rgba(99,242,255,0.08),rgba(255,107,213,0.05));border:1px solid rgba(99,242,255,0.35);border-radius:var(--radius);color:var(--accent);transition:all .18s;text-align:left}
.lmb-cta-import:hover{background:linear-gradient(135deg,rgba(99,242,255,0.15),rgba(255,107,213,0.08));box-shadow:0 0 20px var(--accent-glow)}
.lmb-cta-icon{font-size:22px;flex-shrink:0}
.lmb-nav{display:flex;flex-direction:column;gap:2px}
.lmb-nav-item{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border-radius:10px;color:var(--text-muted);font-size:13px;transition:all .15s;position:relative}
.lmb-nav-item:hover{background:var(--surface);color:var(--text)}
.lmb-nav-item.active{background:rgba(99,242,255,0.07);color:var(--accent)}
.lmb-nav-item.active::before{content:'';position:absolute;left:0;top:22%;bottom:22%;width:3px;background:var(--accent);border-radius:0 2px 2px 0}
.lmb-nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.lmb-nav-count{margin-left:auto;font-size:10px;font-weight:700;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1px 7px;color:var(--text-muted)}
.lmb-sidebar-section{margin-top:8px}
.lmb-sidebar-section-title{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;padding:4px 12px 6px}
.lmb-tool-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;border-radius:10px;color:var(--text-muted);font-size:12px;transition:all .15s}
.lmb-tool-btn:hover{background:var(--surface);color:var(--accent)}
.lmb-tool-count{margin-left:auto;font-size:10px;font-weight:700;color:var(--accent2);background:rgba(255,107,213,0.1);border:1px solid rgba(255,107,213,0.3);border-radius:10px;padding:1px 6px}
.lmb-sidebar-bottom{border-top:1px solid var(--border);padding-top:8px;display:flex;flex-direction:column;gap:4px;margin-top:auto}
.lmb-version-pill{font-size:10px;color:var(--border-accent);text-align:center;padding:4px}

/* ── MAIN ── */
.lmb-main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.lmb-content{flex:1;overflow:hidden}

/* ── LIBRARY ── */
.lmb-library{display:flex;flex-direction:column;height:100%}
.lmb-toolbar{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface2);flex-shrink:0;flex-wrap:wrap}
.lmb-search-wrap{position:relative;flex:1;min-width:180px}
.lmb-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:16px;pointer-events:none}
.lmb-search{width:100%;padding:8px 34px 8px 36px;background:var(--surface);border:1px solid var(--border);border-radius:20px;color:var(--text);outline:none;transition:border-color .15s}
.lmb-search:focus{border-color:var(--accent)}
.lmb-search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:12px}
.lmb-view-toggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.lmb-view-btn{padding:7px 10px;color:var(--text-muted);font-size:15px;transition:all .15s}
.lmb-view-btn.active,.lmb-view-btn:hover{background:var(--surface);color:var(--accent)}
.lmb-stats-bar{display:flex;gap:8px;padding:5px 16px;font-size:11px;color:var(--text-muted);background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0}
.lmb-library-body{display:flex;flex:1;overflow:hidden}
.lmb-library-main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}
.lmb-detail-panel{width:256px;flex-shrink:0;border-left:1px solid var(--border);overflow-y:auto;background:rgba(8,11,20,0.97)}

/* ── TRACK LIST ── */
.lmb-track-list{display:flex;flex-direction:column;height:100%}
.lmb-track-header{display:flex;padding:0 16px;flex-shrink:0;background:var(--surface2);border-bottom:1px solid var(--border)}
.lmb-track-header-cell{padding:8px 6px;font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.6px;cursor:pointer;user-select:none;white-space:nowrap;overflow:hidden}
.lmb-track-header-cell:hover{color:var(--text)}
.lmb-track-rows{flex:1;overflow-y:auto}
.lmb-track-row{display:flex;align-items:center;padding:0 16px;min-height:44px;border-bottom:1px solid rgba(31,42,61,0.6);cursor:pointer;transition:background .1s;border-left:3px solid transparent}
.lmb-track-row:hover{background:rgba(255,255,255,0.025)}
.lmb-track-row--selected{background:rgba(99,242,255,0.06);border-left-color:var(--accent)}
.lmb-track-cell{padding:0 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.lmb-track-title{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lmb-track-sub{color:var(--text-muted);font-size:12px}
.lmb-bpm{font-family:var(--font-mono);font-size:11px;color:var(--accent);font-weight:700}
.lmb-key-badge{font-size:11px;font-weight:700;font-family:var(--font-mono);padding:2px 6px;border-radius:6px;border:1px solid;white-space:nowrap}
.lmb-format-badge{font-size:10px;font-weight:700;font-family:var(--font-mono);padding:2px 6px;border-radius:5px;background:var(--surface);border:1px solid var(--border);color:var(--text-muted)}

/* ── GRID ── */
.lmb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;padding:16px;overflow-y:auto;height:100%;align-content:start}
.lmb-grid-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;transition:all .15s}
.lmb-grid-card:hover{border-color:var(--border-accent);transform:translateY(-2px);box-shadow:0 4px 24px rgba(0,0,0,0.35)}
.lmb-grid-card--selected{border-color:var(--accent);background:rgba(99,242,255,0.05);box-shadow:0 0 18px var(--accent-glow)}

/* ── DETAIL ── */
.lmb-detail{padding:16px;display:flex;flex-direction:column;gap:10px}
.lmb-detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-muted);padding:24px}
.lmb-detail-art{display:flex;gap:10px;align-items:flex-start}
.lmb-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.lmb-detail-row{display:flex;flex-direction:column;gap:2px}
.lmb-detail-label{font-size:9px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px}
.lmb-detail-val{font-size:12px;font-weight:500}
.lmb-stars{font-size:13px;letter-spacing:1px;display:block;margin-top:4px}

/* ── WAVEFORM ── */
.lmb-waveform{display:flex;align-items:center;gap:1.5px;height:38px;padding:4px 0}
.lmb-waveform-bar{width:3px;flex-shrink:0;border-radius:1px;transition:background .2s}

/* ── PLAYER ── */
.lmb-player{height:var(--player-h);flex-shrink:0;background:rgba(5,8,16,0.99);border-top:1px solid var(--border);display:flex;align-items:center;gap:16px;padding:0 20px}
.lmb-player-info{display:flex;align-items:center;gap:10px;width:240px;flex-shrink:0;min-width:0;overflow:hidden}
.lmb-player-title{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lmb-player-artist{font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lmb-player-center{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.lmb-player-controls{display:flex;align-items:center;gap:8px}
.lmb-ctrl-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(--text-muted);font-size:16px;transition:all .15s}
.lmb-ctrl-btn:hover{color:var(--text);background:var(--surface)}
.lmb-ctrl-btn:disabled{opacity:0.3;cursor:not-allowed}
.lmb-ctrl-play{width:40px;height:40px;background:var(--accent);color:#000;font-size:18px;flex-shrink:0}
.lmb-ctrl-play:hover:not(:disabled){opacity:0.85;transform:scale(1.05)}
.lmb-player-timeline{display:flex;align-items:center;gap:8px;width:100%;max-width:500px}
.lmb-player-time{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);width:36px;flex-shrink:0}
.lmb-player-bar{flex:1;height:4px;background:var(--surface);border-radius:2px;cursor:pointer;position:relative;transition:height .1s}
.lmb-player-bar:hover{height:6px}
.lmb-player-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .2s linear}
.lmb-player-bar-handle{position:absolute;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:#fff;border:2px solid var(--accent);pointer-events:none}
.lmb-player-right{display:flex;align-items:center;gap:8px;width:160px;flex-shrink:0;justify-content:flex-end}
.lmb-vol-slider{-webkit-appearance:none;width:72px;height:3px;border-radius:2px;background:var(--surface);outline:none;cursor:pointer}
.lmb-vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer}

/* ── BUTTONS ── */
.lmb-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;font-size:12px;font-weight:600;border:1px solid var(--border);color:var(--text);background:var(--surface);transition:all .15s;white-space:nowrap;cursor:pointer;flex-shrink:0}
.lmb-btn:hover:not(:disabled){border-color:var(--border-accent)}
.lmb-btn:disabled{opacity:0.45;cursor:not-allowed}
.lmb-btn--primary{background:rgba(99,242,255,0.08);border-color:var(--accent);color:var(--accent)}
.lmb-btn--primary:hover:not(:disabled){background:rgba(99,242,255,0.16);box-shadow:0 0 14px var(--accent-glow)}
.lmb-btn--accent2{border-color:var(--accent2);color:var(--accent2);background:rgba(255,107,213,0.07)}
.lmb-btn--success{border-color:var(--success);color:var(--success);background:rgba(57,255,182,0.07)}
.lmb-btn--danger{border-color:var(--danger);color:var(--danger);background:rgba(255,107,107,0.07)}
.lmb-btn--sm{padding:5px 10px;font-size:11px;border-radius:7px}

/* ── BADGE ── */
.lmb-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--text-muted)}

/* ── FORM CONTROLS ── */
.lmb-select{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 10px;outline:none;cursor:pointer;font-size:12px;max-width:160px}
.lmb-select:focus{border-color:var(--accent)}
.lmb-input{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 12px;outline:none;width:100%;font-size:13px;transition:border-color .15s}
.lmb-input:focus{border-color:var(--accent)}

/* ── MODAL ── */
.lmb-modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.72);backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn .15s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.lmb-modal{background:#0e1525;border:1px solid var(--border-accent);border-radius:18px;display:flex;flex-direction:column;max-height:90vh;animation:slideUp .2s;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,0.6)}
@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.lmb-modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.lmb-modal-title{font-size:16px;font-weight:700}
.lmb-modal-close{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:13px;transition:all .15s}
.lmb-modal-close:hover{background:var(--surface);color:var(--text)}
.lmb-modal-body{padding:20px;overflow-y:auto;flex:1}

/* ── PROGRESS ── */
.lmb-progress{display:flex;flex-direction:column;gap:6px}
.lmb-progress-track{height:6px;background:var(--surface);border-radius:3px;overflow:hidden}
.lmb-progress-fill{height:100%;border-radius:3px;transition:width .3s;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.lmb-progress-label{font-size:11px;color:var(--text-muted)}

/* ── TABS ── */
.lmb-tabs{display:flex;gap:4px;padding-bottom:12px;border-bottom:1px solid var(--border);margin-bottom:4px;flex-wrap:wrap}
.lmb-tab{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;color:var(--text-muted);border:1px solid transparent;transition:all .15s;display:flex;align-items:center;gap:6px}
.lmb-tab:hover{color:var(--text);background:var(--surface)}
.lmb-tab--active{border-color:var(--accent);color:var(--accent);background:rgba(99,242,255,0.06)}

/* ── TOGGLE ── */
.lmb-toggle{width:40px;height:22px;border-radius:11px;background:var(--border-accent);border:1px solid var(--border);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.lmb-toggle.on{background:var(--accent);border-color:var(--accent)}
.lmb-toggle-knob{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s}
.lmb-toggle.on .lmb-toggle-knob{left:20px}

/* ── WIZARD ── */
.lmb-wizard-body{display:flex;flex-direction:column}
.lmb-wizard-icon{font-size:52px;text-align:center;margin-bottom:12px}
.lmb-scan-anim{font-size:52px;text-align:center;animation:spin 1.4s linear infinite;display:block;margin-bottom:12px;color:var(--accent)}
@keyframes spin{to{transform:rotate(360deg)}}
.lmb-drop-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;padding:40px;background:var(--surface);border:2px dashed var(--border-accent);border-radius:16px;cursor:pointer;transition:all .2s;text-align:center;color:var(--text)}
.lmb-drop-zone:hover{border-color:var(--accent);background:rgba(99,242,255,0.05);box-shadow:0 0 24px var(--accent-glow)}
.lmb-import-list{border:1px solid var(--border);border-radius:10px;overflow-y:auto;max-height:260px}
.lmb-import-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);transition:background .1s}
.lmb-import-row:last-child{border-bottom:none}
.lmb-import-row--selected{background:rgba(99,242,255,0.06)!important}
.lmb-import-row:hover{background:rgba(255,255,255,0.02)}

/* ── TAGGER ── */
.lmb-provider-btn{padding:6px 12px;border-radius:8px;font-size:12px;color:var(--text-muted);border:1px solid var(--border);background:var(--surface);transition:all .15s;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.lmb-provider-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(99,242,255,0.08)}
.lmb-provider-btn:hover{border-color:var(--border-accent);color:var(--text)}
.lmb-provider-btn.disabled{opacity:0.45}
.lmb-settings-hint a{color:var(--accent);text-decoration:none}
.lmb-settings-hint a:hover{text-decoration:underline}
.lmb-tagger-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.lmb-tagger-bulk{display:flex;align-items:center;justify-content:space-between;padding:8px 0 10px;border-bottom:1px solid var(--border);margin-bottom:10px}
.lmb-tagger-list{display:flex;flex-direction:column;gap:8px;max-height:380px;overflow-y:auto}
.lmb-tagger-row{display:flex;align-items:flex-start;gap:12px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;transition:all .2s}
.lmb-tagger-row.accepted{border-color:var(--success);background:rgba(57,255,182,0.04)}
.lmb-tagger-row.rejected{opacity:0.4}
.lmb-tagger-fields{display:flex;flex-wrap:wrap;gap:6px}
.lmb-tagger-field{display:flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;background:var(--surface2);border-radius:6px;border:1px solid var(--border)}
.lmb-tagger-field.changed{border-color:rgba(255,107,213,0.4)}
.lmb-tagger-field-label{color:var(--text-muted);font-weight:700;text-transform:uppercase;font-size:9px}
.lmb-tagger-field-old{color:var(--text-muted)}
.lmb-tagger-arrow{color:var(--accent2)}
.lmb-tagger-field-new{color:var(--accent);font-weight:700}

/* ── SETTINGS ── */
.lmb-settings-grid{display:flex;flex-direction:column;gap:12px}
.lmb-settings-section{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;padding-top:8px;border-top:1px solid var(--border)}
.lmb-settings-row{display:flex;align-items:center;justify-content:space-between;gap:16px}
.lmb-settings-label{color:var(--text-muted);font-size:13px}
.lmb-settings-hint{font-size:11px;color:var(--text-muted);padding:8px;background:var(--surface2);border-radius:8px;line-height:1.7}

/* ── TWEAKS ── */
.lmb-tweaks{position:fixed;bottom:calc(var(--player-h)+12px);right:16px;background:#0e1525;border:1px solid var(--border-accent);border-radius:14px;padding:14px 16px;min-width:300px;z-index:900;box-shadow:0 8px 40px rgba(0,0,0,0.6);animation:slideUp .2s}
.lmb-tweaks-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.lmb-tweaks-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px;font-size:12px;flex-wrap:wrap}
.lmb-tweak-btn{padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:var(--surface);font-size:11px;color:var(--text-muted);transition:all .15s}
.lmb-tweak-btn:hover,.lmb-tweak-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(99,242,255,0.07)}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-accent);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}
</style>
</head>
<body>
<div id="root"></div>
